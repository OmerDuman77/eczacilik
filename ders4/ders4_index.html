<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ders 4 - Eczacılık Dersleri</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f7f5f0;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --text-muted: #6b6b6b;
            --accent: #1a6b4e;
            --accent-light: #e8f5ee;
            --border: #e2ddd5;
        }
        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hero {
            width: 100%;
            padding: 3rem 1.5rem 2rem;
            text-align: center;
            background: linear-gradient(135deg, #1a6b4e 0%, #0d3d2d 100%);
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: #fff; }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
        }
        .hero p { font-size: 1rem; opacity: 0.85; margin-top: 0.4rem; }
        .container {
            width: 100%;
            max-width: 720px;
            padding: 2rem 1.5rem 4rem;
        }
        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        .file-list { display: flex; flex-direction: column; gap: 0.6rem; }
        .file-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s ease;
        }
        .file-item:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 12px rgba(26,107,78,0.08);
            transform: translateY(-1px);
        }
        .file-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--accent-light);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .file-name {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .file-arrow {
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .file-item:hover .file-arrow { opacity: 1; }
        footer {
            text-align: center;
            padding: 2rem 1rem;
            font-size: 0.82rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            width: 100%;
        }
        @media (max-width: 480px) {
            .hero h1 { font-size: 1.6rem; }
            .file-item { padding: 0.85rem 1rem; }
        }
    </style>
</head>
<body>
    <header class="hero">
        <a href="../" class="back-link">← Ana Sayfa</a>
        <h1>Ders 4</h1>
        <p>Fitoterapötikler</p>
    </header>
    <main class="container">
        <p class="section-label">Ders Materyalleri</p>
        <div class="file-list">
            <a href="fitoterapotikler.html" class="file-item">
                <div class="file-icon">HTML</div>
                <span class="file-name">Fitoterapötikler</span>
                <span class="file-arrow">→</span>
            </a>
            <a href="fitoterapotikler_4_5_ders.html" class="file-item">
                <div class="file-icon">HTML</div>
                <span class="file-name">Fitoterapötikler - Ders 4 & 5</span>
                <span class="file-arrow">→</span>
            </a>
            <a href="fitoterapotikler_6_10.html" class="file-item">
                <div class="file-icon">HTML</div>
                <span class="file-name">Fitoterapötikler - Ders 6-10</span>
                <span class="file-arrow">→</span>
            </a>
            <a href="fitoterapotikler_7_8_9_ders.html" class="file-item">
                <div class="file-icon">HTML</div>
                <span class="file-name">Fitoterapötikler - Ders 7, 8 & 9</span>
                <span class="file-arrow">→</span>
            </a>
        </div>
    </main>
    <footer>Eczacılık Dersleri &copy; 2026</footer>
</body>
</html>
