<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anemi Sınavı - 40 Soru</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0eb;
  --card: #ffffff;
  --primary: #8b2c3a;
  --primary-light: #a83a4a;
  --accent: #c4553a;
  --text: #2a2226;
  --text-muted: #6b5e62;
  --border: #e0d6cf;
  --correct: #2d7a4f;
  --correct-bg: #e8f5ee;
  --wrong: #a8323a;
  --wrong-bg: #fce8e8;
  --selected: #f0e6d6;
  --shadow: 0 2px 12px rgba(42,34,38,0.06);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

.hero {
  background: linear-gradient(135deg, #8b2c3a 0%, #5a1a24 60%, #2a2226 100%);
  padding: 60px 24px 50px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -40%; left: -20%;
  width: 140%; height: 180%;
  background: radial-gradient(ellipse at 30% 50%, rgba(196,85,58,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 30%, rgba(255,255,255,0.04) 0%, transparent 50%);
  pointer-events: none;
}
.hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(28px, 5vw, 42px);
  color: #fff;
  position: relative;
  letter-spacing: 0.5px;
}
.hero p {
  color: rgba(255,255,255,0.7);
  font-size: 16px;
  margin-top: 10px;
  position: relative;
  font-weight: 300;
}
.hero .badge {
  display: inline-block;
  margin-top: 16px;
  padding: 6px 18px;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px;
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  font-weight: 500;
  position: relative;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 30px 20px 60px;
}

.progress-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.progress-bar .track {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar .fill {
  height: 100%;
  background: var(--primary);
  border-radius: 3px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-bar .counter {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  white-space: nowrap;
}

.question-card {
  background: var(--card);
  border-radius: 12px;
  padding: 28px 28px 24px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: border-color 0.3s;
}
.question-card.answered-correct { border-color: var(--correct); }
.question-card.answered-wrong { border-color: var(--wrong); }

.q-header {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 18px;
}
.q-num {
  flex-shrink: 0;
  width: 36px; height: 36px;
  background: var(--primary);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
}
.q-text {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  padding-top: 5px;
}

.options { display: flex; flex-direction: column; gap: 8px; }

.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 15px;
  user-select: none;
}
.option:hover { background: var(--selected); border-color: #c4b8af; }
.option .letter {
  flex-shrink: 0;
  width: 26px; height: 26px;
  border: 1.5px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  transition: all 0.2s;
}
.option.selected { background: var(--selected); border-color: var(--primary); }
.option.selected .letter { background: var(--primary); color: #fff; border-color: var(--primary); }
.option.correct { background: var(--correct-bg); border-color: var(--correct); }
.option.correct .letter { background: var(--correct); color: #fff; border-color: var(--correct); }
.option.wrong { background: var(--wrong-bg); border-color: var(--wrong); }
.option.wrong .letter { background: var(--wrong); color: #fff; border-color: var(--wrong); }
.option.disabled { pointer-events: none; opacity: 0.6; }
.option.correct.disabled { opacity: 1; }

.explanation {
  display: none;
  margin-top: 14px;
  padding: 14px 16px;
  background: #faf7f4;
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.5;
}
.explanation.show { display: block; }

.actions {
  text-align: center;
  margin-top: 36px;
}

button.submit-btn {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 14px 48px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  box-shadow: 0 4px 14px rgba(139,44,58,0.25);
}
button.submit-btn:hover { background: var(--primary-light); transform: translateY(-1px); }
button.submit-btn:active { transform: translateY(0); }

.result-panel {
  display: none;
  background: var(--card);
  border-radius: 16px;
  padding: 40px 32px;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  margin-bottom: 30px;
}
.result-panel.show { display: block; }
.result-panel h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  margin-bottom: 8px;
}
.result-panel .score {
  font-size: 52px;
  font-weight: 700;
  color: var(--primary);
  margin: 16px 0;
}
.result-panel .score span { font-size: 22px; color: var(--text-muted); font-weight: 400; }
.result-panel .verdict {
  font-size: 16px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

.answer-key-toggle {
  font-family: 'Source Sans 3', sans-serif;
  background: none;
  border: 2px solid var(--primary);
  color: var(--primary);
  padding: 10px 28px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 12px;
}
.answer-key-toggle:hover { background: var(--primary); color: #fff; }

.answer-key {
  display: none;
  margin-top: 30px;
  background: var(--card);
  border-radius: 12px;
  padding: 28px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.answer-key.show { display: block; }
.answer-key h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  margin-bottom: 16px;
  color: var(--primary);
}
.key-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 6px;
}
.key-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  font-size: 14px;
  border-radius: 6px;
  background: #faf7f4;
}
.key-item strong {
  color: var(--primary);
  min-width: 40px;
}

@media (max-width: 600px) {
  .question-card { padding: 20px 18px 18px; }
  .hero { padding: 40px 18px 36px; }
  .container { padding: 20px 14px 40px; }
  .key-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
}
</style>
</head>
<body>

<div class="hero">
  <h1>Anemiler Sınavı</h1>
  <p>Laboratuvar Analizleri ve Yorumlama</p>
  <div class="badge">40 Soru &middot; 5 Seçenek &middot; Doç. Dr. Ozan Emre Eyupoğlu</div>
</div>

<div class="progress-bar" id="progressBar">
  <div class="track"><div class="fill" id="progressFill"></div></div>
  <div class="counter" id="progressCounter">0 / 40</div>
</div>

<div class="container">
  <div class="result-panel" id="resultPanel">
    <h2>Sınav Sonucunuz</h2>
    <div class="score" id="scoreDisplay">0 <span>/ 40</span></div>
    <div class="verdict" id="verdict"></div>
    <button class="answer-key-toggle" onclick="toggleAnswerKey()">Cevap Anahtarını Göster</button>
    <div class="answer-key" id="answerKey">
      <h3>Cevap Anahtarı</h3>
      <div class="key-grid" id="keyGrid"></div>
    </div>
  </div>

  <div id="questionsContainer"></div>

  <div class="actions">
    <button class="submit-btn" id="submitBtn" onclick="submitQuiz()">Sınavı Tamamla</button>
  </div>
</div>

<script>
const questions = [
  {
    q: "Anemi tanımı aşağıdakilerden hangisidir?",
    o: ["Lökosit sayısının artması","Hemoglobin düzeyinin yaş ve cinsiyete göre referans aralıkların altına düşmesi","Trombosit sayısının azalması","Hematokrit değerinin yükselmesi","Eritrosit sayısının artması"],
    a: 1
  },
  {
    q: "Aşağıdakilerden hangisi aneminin temel mekanizmalarından biri DEĞİLDİR?",
    o: ["Yetersiz eritrosit üretimi","Artmış eritrosit yıkımı","Kan kaybı","Artmış trombosit üretimi","Kemik iliği yetmezliği"],
    a: 3
  },
  {
    q: "Mikrositer anemi tanısı için MCV değeri kaç femtolitrenin altında olmalıdır?",
    o: ["60","70","80","90","100"],
    a: 2
  },
  {
    q: "Aşağıdakilerden hangisi mikrositer anemi nedenlerinden biri DEĞİLDİR?",
    o: ["Demir eksikliği anemisi","Talasemi sendromları","Vitamin B12 eksikliği","Kronik hastalık anemisi","Sideroblastik anemi"],
    a: 2
  },
  {
    q: "Demir eksikliği anemisinde en duyarlı depolama göstergesi aşağıdakilerden hangisidir?",
    o: ["Serum demiri","Transferrin satürasyonu","Ferritin","TIBC","Hemoglobin"],
    a: 2
  },
  {
    q: "Demir eksikliği anemisinde total demir bağlama kapasitesi (TIBC) nasıl değişir?",
    o: ["Azalır","Normal kalır","Artar","Önce artar sonra azalır","Değişken olur"],
    a: 2
  },
  {
    q: "Demir eksikliği anemisinde periferik yaymada aşağıdakilerden hangisi görülür?",
    o: ["Hipersegmenteli nötrofiller","Hedef hücreler","Sferositler","Hipokrom, mikrositer eritrositler","Şistositler"],
    a: 3
  },
  {
    q: "Demir eksikliği anemisinde eritrosit dağılım genişliği (RDW) nasıl değişir?",
    o: ["Azalır","Normal kalır","Artar","Sıfırlanır","Değişmez"],
    a: 2
  },
  {
    q: "Beta talasemi taşıyıcılığında aşağıdakilerden hangisi yükselir?",
    o: ["Ferritin","TIBC","Hemoglobin A₂","Transferrin satürasyonu","LDH"],
    a: 2
  },
  {
    q: "Talasemide RDW değeri nasıldır?",
    o: ["Belirgin yüksek","Normal","Belirgin düşük","Ölçülemez","Değişken"],
    a: 1
  },
  {
    q: "Talasemide periferik yaymada hangi hücre tipik olarak görülür?",
    o: ["Sferositler","Şistositler","Hedef hücreler (target cells)","Orak hücreler","Hipersegmenteli nötrofiller"],
    a: 2
  },
  {
    q: "Demir eksikliği anemisini talasemiden ayırt etmede en önemli parametreler hangileridir?",
    o: ["Hemoglobin ve hematokrit","RDW ve ferritin","LDH ve haptoglobin","Bilirubin ve retikülosit","MCV ve MCH"],
    a: 1
  },
  {
    q: "Normositer anemi için MCV aralığı hangisidir?",
    o: ["< 60 fL","60-80 fL","80-100 fL","100-120 fL","> 120 fL"],
    a: 2
  },
  {
    q: "Aşağıdakilerden hangisi normositer anemi nedeni DEĞİLDİR?",
    o: ["Akut kan kaybı","Hemolitik anemiler","Folat eksikliği","Kronik hastalık anemisi","Aplastik anemi"],
    a: 2
  },
  {
    q: "Hemolitik anemide aşağıdakilerden hangisi ARTAR?",
    o: ["Haptoglobin","Direkt bilirubin","Laktat dehidrogenaz (LDH)","Ferritin","TIBC"],
    a: 2
  },
  {
    q: "Hemolitik anemide haptoglobin düzeyi nasıl değişir?",
    o: ["Artar","Normal kalır","Azalır","Önce artar sonra azalır","Ölçülemeyecek kadar yükselir"],
    a: 2
  },
  {
    q: "Hemolitik anemide hangi bilirubin fraksiyonu yükselir?",
    o: ["Direkt (konjuge) bilirubin","İndirekt (konjuge olmayan) bilirubin","Total bilirubin azalır","Her iki fraksiyon eşit artar","Bilirubin değişmez"],
    a: 1
  },
  {
    q: "Hemolitik anemide retikülosit sayısı nasıl değişir?",
    o: ["Azalır","Normal kalır","Artar","Sıfırlanır","Ölçülemez"],
    a: 2
  },
  {
    q: "Mikroanjiyopatik hemolizde periferik yaymada hangi hücre görülür?",
    o: ["Hedef hücreler","Hipersegmenteli nötrofiller","Şistositler","Akantositler","Eliptositler"],
    a: 2
  },
  {
    q: "Makrositer anemi tanısı için MCV değeri kaçın üzerinde olmalıdır?",
    o: ["80 fL","90 fL","100 fL","110 fL","120 fL"],
    a: 2
  },
  {
    q: "Aşağıdakilerden hangisi makrositer anemi nedenlerinden biri DEĞİLDİR?",
    o: ["Vitamin B12 eksikliği","Folat eksikliği","Demir eksikliği","Alkol kullanımı","Miyelodisplastik sendrom"],
    a: 2
  },
  {
    q: "Vitamin B12 eksikliğinde yükselen ve B12'ye özgü belirteç aşağıdakilerden hangisidir?",
    o: ["Homosistein","Ferritin","Metilmalonik asit","LDH","Haptoglobin"],
    a: 2
  },
  {
    q: "Vitamin B12 eksikliğinde periferik yaymada hangi bulgu tipiktir?",
    o: ["Sferositler","Hedef hücreler","Şistositler","Hipersegmenteli nötrofiller","Orak hücreler"],
    a: 3
  },
  {
    q: "Folat eksikliğini Vitamin B12 eksikliğinden ayırt eden en önemli laboratuvar bulgusu hangisidir?",
    o: ["MCV yüksekliği","Homosistein yüksekliği","Metilmalonik asit düzeyinin normal olması","RDW yüksekliği","Hemoglobin düşüklüğü"],
    a: 2
  },
  {
    q: "Folat eksikliğine neden olabilen ilaç aşağıdakilerden hangisidir?",
    o: ["Aspirin","Metotreksat","Parasetamol","Amoksisilin","Omeprazol"],
    a: 1
  },
  {
    q: "Anemi değerlendirme algoritmasında ilk bakılması gereken parametre hangisidir?",
    o: ["Ferritin","Retikülosit","MCV","LDH","Haptoglobin"],
    a: 2
  },
  {
    q: "Retikülosit sayısının yüksek olması aşağıdakilerden hangisini düşündürür?",
    o: ["Kemik iliği yetmezliği","Demir eksikliği","Hemoliz veya kan kaybı","B12 eksikliği","Kronik hastalık anemisi"],
    a: 2
  },
  {
    q: "Tam kan sayımında (CBC) aşağıdakilerden hangisi yer ALMAZ?",
    o: ["Hemoglobin","MCV","RDW","Ferritin","Hematokrit"],
    a: 3
  },
  {
    q: "Transferrin satürasyonu hangi parametrelerin oranından hesaplanır?",
    o: ["Ferritin / Hemoglobin","Serum demiri / TIBC","LDH / Haptoglobin","MCV / RDW","Bilirubin / Albumin"],
    a: 1
  },
  {
    q: "Akut kanamalı hastalarda başvuru anında hematokrit düzeyi nasıl olabilir?",
    o: ["Çok düşük","Çok yüksek","Normal olabilir","Daima düşüktür","Ölçülemez"],
    a: 2
  },
  {
    q: "İntravasküler hemolizli hastalarda hangi biyokimyasal değer yükselir?",
    o: ["Direkt bilirubin","İndirekt bilirubin","Albumin","Kreatin kinaz","Amilaz"],
    a: 1
  },
  {
    q: "Üst gastrointestinal sistem kanamalı hastalarda sindirilmiş kan nedeniyle hangi değer yükselir?",
    o: ["Kreatinin","BUN (Blood Urea Nitrogen)","ALT","AST","GGT"],
    a: 1
  },
  {
    q: "Arter kan gazı analizi aşağıdaki bilgilerden hangisini VERMEZ?",
    o: ["Oksijenizasyon durumu","Asit-baz dengesi","Hemoglobin düzeyi","Ferritin düzeyi","pH değeri"],
    a: 3
  },
  {
    q: "Hemoglobinüri veya ürobilinojen varlığı hangi durumu düşündürür?",
    o: ["Demir eksikliği","Folat eksikliği","Hemoliz","Kemik iliği yetmezliği","Kronik hastalık"],
    a: 2
  },
  {
    q: "Doğurganlık çağındaki anemili kadınlarda hangi test bakılmalıdır?",
    o: ["Anti-nükleer antikor","TSH","β-hCG","D-dimer","Prokalsitonin"],
    a: 2
  },
  {
    q: "Kronik anemili hastalarda göğüs radyografisinde sıklıkla hangi bulgu görülür?",
    o: ["Pnömotoraks","Kardiyomiyopati görünümü","Plevral efüzyon","Atelektazi","Mediastinal kitle"],
    a: 1
  },
  {
    q: "Globin zincirlerindeki mutasyonların neden olduğu hastalıklar aşağıdakilerden hangisidir?",
    o: ["Demir eksikliği anemisi ve folat eksikliği","Orak hücre anemisi ve talasemiler","Aplastik anemi ve MDS","B12 eksikliği ve folat eksikliği","Sideroblastik anemi ve kurşun zehirlenmesi"],
    a: 1
  },
  {
    q: "Hemoglobin elektroforezi en çok hangi anemi grubunun tanısında yardımcıdır?",
    o: ["Demir eksikliği anemisi","Megaloblastik anemiler","Hemolitik anemiler","Aplastik anemi","Kronik hastalık anemisi"],
    a: 2
  },
  {
    q: "Vitamin B12'nin eksikliğinde hangi tip anemi görülür?",
    o: ["Mikrositer anemi","Normositer anemi","Megaloblastik anemi","Sideroblastik anemi","Aplastik anemi"],
    a: 2
  },
  {
    q: "Aneminin tanısal yaklaşımında MCV, Ferritin ve Retikülosit üçlüsünün önemi nedir?",
    o: ["Tedavi planlaması için yeterlidir","Genellikle doğru yönlendirmeyi sağlar","Sadece hemolitik anemilerde kullanılır","Yalnızca mikrositer anemilerde anlamlıdır","Kronik hastalık anemisini ekarte eder"],
    a: 1
  }
];

const letters = ['A','B','C','D','E'];
let answered = 0;

function buildQuiz() {
  const container = document.getElementById('questionsContainer');
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `q${i}`;
    let optionsHTML = q.o.map((opt, j) => `
      <div class="option" data-q="${i}" data-o="${j}" onclick="selectOption(${i},${j})">
        <div class="letter">${letters[j]}</div>
        <div>${opt}</div>
      </div>
    `).join('');
    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${i+1}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="options">${optionsHTML}</div>
      <div class="explanation" id="exp${i}"></div>
    `;
    container.appendChild(card);
  });
}

function selectOption(qi, oi) {
  const card = document.getElementById(`q${qi}`);
  if (card.classList.contains('answered-correct') || card.classList.contains('answered-wrong')) return;
  const opts = card.querySelectorAll('.option');
  opts.forEach(o => o.classList.remove('selected'));
  opts[oi].classList.add('selected');
  updateProgress();
}

function updateProgress() {
  const selected = document.querySelectorAll('.option.selected').length;
  const pct = (selected / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCounter').textContent = `${selected} / ${questions.length}`;
}

function submitQuiz() {
  let score = 0;
  questions.forEach((q, i) => {
    const card = document.getElementById(`q${i}`);
    const opts = card.querySelectorAll('.option');
    const selected = card.querySelector('.option.selected');
    const correctIdx = q.a;

    opts[correctIdx].classList.add('correct');
    opts.forEach(o => o.classList.add('disabled'));

    if (selected) {
      const selIdx = parseInt(selected.dataset.o);
      if (selIdx === correctIdx) {
        score++;
        card.classList.add('answered-correct');
      } else {
        selected.classList.add('wrong');
        card.classList.add('answered-wrong');
      }
    } else {
      card.classList.add('answered-wrong');
    }
  });

  document.getElementById('scoreDisplay').innerHTML = `${score} <span>/ ${questions.length}</span>`;
  const pct = Math.round((score / questions.length) * 100);
  let verdict = '';
  if (pct >= 90) verdict = 'Mükemmel! Konuya hakimsiniz.';
  else if (pct >= 70) verdict = 'Başarılı! Birkaç konuyu tekrar gözden geçirebilirsiniz.';
  else if (pct >= 50) verdict = 'Orta düzey. Daha fazla çalışma gerekli.';
  else verdict = 'Konuları tekrar etmeniz önerilir.';
  document.getElementById('verdict').textContent = `%${pct} başarı — ${verdict}`;

  // Build answer key
  const keyGrid = document.getElementById('keyGrid');
  keyGrid.innerHTML = questions.map((q, i) =>
    `<div class="key-item"><strong>S${i+1}:</strong> ${letters[q.a]}</div>`
  ).join('');

  document.getElementById('resultPanel').classList.add('show');
  document.getElementById('submitBtn').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleAnswerKey() {
  document.getElementById('answerKey').classList.toggle('show');
}

buildQuiz();
</script>
</body>
</html>
